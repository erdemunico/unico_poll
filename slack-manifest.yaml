display_information:
  name: Unico Poll
  description: Internal 3-phase polling app for Slack
  background_color: "#2f2f2f"
features:
  bot_user:
    display_name: Unico Poll
    always_online: false
  slash_commands:
    - command: /unico-poll
      description: Start a 3-phase Unico poll
      usage_hint: "Poll Title | 48h"
      should_escape: false
oauth_config:
  scopes:
    bot:
      - commands
      - chat:write
      - chat:write.public
      - channels:history
      - groups:history
      - im:history
      - mpim:history
settings:
  event_subscriptions:
    bot_events:
      - message.channels
      - message.groups
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
